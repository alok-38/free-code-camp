<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Setting text content</title>
    <style>
      .container {
        display: flex;
        gap: 0.5rem;
        flex-direction: column;
      }

      button {
        width: 200px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <textarea class="story" name="" id=""></textarea>
      <button id="set-text" type="button">Set text content</button>
      <button id="clear-text" type="button">Clear text content</button>
    </div>
    <script>
      const textArea = document.querySelector("textarea");
      const setContentBtn = document.getElementById("set-text");
      const clearContentBtn = document.getElementById("clear-text");
      setContentBtn.addEventListener("click", () => {
        textArea.textContent = "Doom 3";
      });
      clearContentBtn.addEventListener("click", () => {
        textArea.textContent = "";
      });
    </script>
  </body>
</html>
