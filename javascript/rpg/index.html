<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JavaScript Role Playing Game</title>
    <link rel="stylesheet" href="style.css" />
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="game" id="game">
      <!-- Stats Section -->
      <section class="game__stats" id="game-stats">
        <div class="game__stat game__stat--xp" id="stat-xp">
          XP: <span class="game__stat-value" id="xp-value"></span>
        </div>
        <div class="game__stat game__stat--health" id="stat-health">
          Health: <span class="game__stat-value" id="health-value"></span>
        </div>
        <div class="game__stat game__stat--gold" id="stat-gold">
          Gold: <span class="game__stat-value" id="gold-value"></span>
        </div>
      </section>

      <!-- Actions Section -->
      <section class="game__actions" id="game-actions">
        <button class="game__button game__button--store" id="btn-store">
          Go to store
        </button>
        <button class="game__button game__button--cave" id="btn-cave">
          Go to cave
        </button>
        <button class="game__button game__button--fight" id="btn-fight">
          Fight dragon
        </button>
      </section>

      <!-- Events Section -->
       <section class="game__events" id="game-events">

       </section>

      <!-- Text Section -->
      <section class="game__text" id="game-text">
        Welcome to Dragon Repeller. You must defeat the dragon that is
        preventing people from leaving the town. You are in the town square.
        Where do you want to go? Use the button's above.
      </section>
    </main>
  </body>
</html>
