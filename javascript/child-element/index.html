<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Adding a child element</title>
    <style>
      .container {
        display: flex;
        gap: 0.5rem;
        flex-direction: column;
      }

      button {
        width: 100px;
      }

      div.parent {
        border: 1px solid black;
        padding: 5px;
        width: 100px;
        height: 100px;
      }

      div.child {
        border: 1px solid red;
        margin: 10px;
        padding: 5px;
        width: 80px;
        height: 60px;
        box-sizing: border-box;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="parent">parent</div>
      <button id="add-child" type="button">Add a child</button>
      <button id="remove-child" type="button">Remove child</button>
    </div>
    <script>
      const parentEl = document.querySelector(".parent");
      const addChildBtn = document.getElementById("add-child");
      const removeChildBtn = document.getElementById("remove-child");

      addChildBtn.addEventListener("click", () => {
        const childEl = document.createElement("div");
        childEl.classList.add("child");
        childEl.textContent = "child";
        parentEl.appendChild(childEl);
      });

      removeChildBtn.addEventListener("click", () => {
        if (parentEl.lastChild) {
          parentEl.removeChild(parentEl.lastChild);
        }
      });
    </script>
  </body>
</html>
