<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document Object Model (DOM)</title>
  </head>
  <body>
    <table></table>
    <script>
      const heading = document.createElement("h1");
      const headingText = document.createTextNode("Doom 3");
      heading.appendChild(headingText);
      document.body.appendChild(heading);
      const tableEl = document.querySelector("table");
      const tableAttributes = tableEl.attributes;
      for (const attributes of tableAttributes) {
        if (attributes.nodeName.toLocaleLowerCase() === "border") {
          tableEl.border = "1";
        }
      }
      tableEl.summary = "note: increased border";
    </script>
  </body>
</html>
