# fly.toml app configuration file generated for boilerplate-npm-app on 2023-12-04T09:09:04+05:30
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = "boilerplate-npm-app"
primary_region = "nrt"

[build]

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
