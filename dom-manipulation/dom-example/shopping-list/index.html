<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A dynamic shopping list</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <main>
        <h1>My shopping list
        </h1>
        <form action="">
            <label for="name" id="name">Enter a new item:</label>
            <input type="text" name="text" id="text" placeholder="new item">
            <button type="submit">Add item</button>
        </form>
    </main>
    <script defer src="app.js"></script>
</body>

</html>
